name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "roboeval/**"
      - "mkdocs.yml"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gh-deploy needs the full history to push to gh-pages

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install docs extras (lightweight)
        # Full project deps (lerobot + CUDA torch + mujoco + …) won't fit
        # on the runner's 14 GB disk. Griffe parses source statically by
        # default, so the docs build only needs the mkdocs tooling plus
        # the roboeval source on disk. Editable + --no-deps gives us that
        # without dragging in the full ML stack.
        run: |
          python -m pip install --upgrade pip
          pip install "mkdocs>=1.6" "mkdocs-material>=9.5" \
                      "mkdocstrings[python]>=0.25"
          pip install --no-deps -e .

      - name: Build (strict)
        run: mkdocs build --strict

      - name: Deploy to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdocs gh-deploy --force --remote-branch gh-pages
