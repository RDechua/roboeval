name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev tools
        run: |
          python -m pip install --upgrade pip
          pip install "ruff>=0.5,<0.6" "mypy>=1.10" "pytest>=8.0"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy strict
        run: mypy --strict roboeval

      - name: Pytest
        run: pytest -q
