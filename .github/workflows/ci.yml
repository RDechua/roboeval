name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev tools and minimal runtime deps
        # Installs the minimum needed for non-slow tests to collect and
        # run on clean Ubuntu: ruff/mypy/pytest plus numpy + gymnasium +
        # omegaconf + pyyaml + wandb (CLI regression test imports it via
        # wandb_run) + torch (CPU wheel — seed_everything imports it).
        # NOT installed: lerobot, mujoco, gym_aloha (those are only
        # exercised by @pytest.mark.slow tests, which CI deselects).
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu \
                      "torch>=2.0"
          pip install "ruff>=0.5,<0.6" "mypy>=1.10" "pytest>=8.0" \
                      "numpy>=1.26" "gymnasium>=0.29" "omegaconf>=2.3" \
                      "pyyaml>=6.0" "wandb>=0.16" \
                      "plotly>=5.20" "dash>=2.17" \
                      "dash-bootstrap-components>=1.5"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy strict
        run: mypy --strict roboeval

      - name: Pytest
        run: pytest -q
