# Full nominal evaluation: 3 seed groups x 50 rollouts = 150 rollouts.
# Estimated wall time on M1 CPU: 2.5-4 hours (overnight run).
# PRD Section 10.2 Week 2 target; PRD Section 6.3 reporting convention.

policy:
  repo_id: lerobot/act_aloha_sim_transfer_cube_human
  device: mps   # falls back to CPU automatically if MPS not available

env:
  task: AlohaTransferCube-v0
  episode_length: 400   # PRD Section 7.2

eval:
  seeds: [0, 1, 2]
  n_rollouts_per_seed: 50
  max_steps: 400

success:
  z_threshold_m: 0.05            # PRD constant
  # Calibrated values pulled from data/calibration/transfer_cube_target_xy.json
  # via the `calibration:` OmegaConf resolver registered by the CLI.
  # Re-run `roboeval calibrate` to regenerate the JSON; configs auto-pick up.
  xy_tolerance_m: ${calibration:xy_tolerance_m}
  # dwell_steps tuned to 1 because gym-aloha terminates the moment
  # reward==4 (left gripper holds cube above table) — so the cube has
  # at most one in-zone step before the loop breaks. See PRD §6.2 for
  # the gym-aloha termination semantics and the dwell vs perturbation
  # tradeoff; perturbation suites (Week 4) may use higher values where
  # stable hold is the discriminator.
  dwell_steps: 1
  target_xy: ${calibration:target_xy}

wandb:
  project: roboeval
  name_prefix: act_nominal
  tags: [week2, baseline, act, nominal]
  mode: online
