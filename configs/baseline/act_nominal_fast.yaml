# Fast smoke config for Phase C verification: 1 seed group x 10 rollouts.
# Estimated wall time on M1 CPU: 3-5 minutes.
# This is the development gate; the full act_nominal.yaml is the overnight run.

policy:
  repo_id: lerobot/act_aloha_sim_transfer_cube_human
  device: mps

env:
  task: AlohaTransferCube-v0
  episode_length: 400

eval:
  seeds: [0]
  n_rollouts_per_seed: 10
  max_steps: 400

success:
  z_threshold_m: 0.05
  # Calibrated 2026-05-12 (commit c3a279b); see
  # data/calibration/transfer_cube_target_xy.json.
  xy_tolerance_m: 0.02185
  dwell_steps: 5
  target_xy: [-0.01835, 0.50576]

wandb:
  project: roboeval
  name_prefix: act_nominal_fast
  tags: [week2, smoke, act]
  mode: offline   # don't require W&B auth for the smoke run
