site_name: RoboEval
site_description: Failure-mode study and residual RL for ACT/Diffusion Policy on AlohaTransferCube.
site_url: https://rdechua.github.io/roboeval/
repo_url: https://github.com/RDechua/roboeval
repo_name: RDechua/roboeval
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            show_source: true
            show_root_heading: true
            members_order: source
            separate_signature: true
            docstring_style: google
            show_signature_annotations: true
            heading_level: 2

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Project:
      - PRD: PRD.md
      - Getting started: getting-started.md
  - API Reference:
      - Overview: reference/index.md
      - CLI: reference/cli.md
      - envs: reference/envs.md
      - evaluation: reference/evaluation.md
      - policies: reference/policies.md
      - taxonomy: reference/taxonomy.md
      - residual: reference/residual.md
      - dashboard: reference/dashboard.md
  - Blog:
      - "Honest null on +5cm": blog/2026-05-21-honest-null-residual.md

# These files exist on GitHub for the developer audience but reference
# repo-relative paths that only resolve on github.com, not on the static
# site. `exclude_docs:` keeps them out of the build entirely so strict
# mode passes; readers reach them via github.com URLs from the README.
exclude_docs: |
  STATE.md
  phase4_ablation.md
  research-log.md
  audit-2026-06-10.md
  superpowers/

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/RDechua/roboeval
    - icon: simple/huggingface
      link: https://huggingface.co/spaces/rubenodechua/roboeval
